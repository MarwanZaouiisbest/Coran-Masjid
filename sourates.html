<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>masjid coran</title>



  <style>
    .arabe {
      direction: rtl;
      font-size: 32px;
      text-align: right;
      margin: 20px;
      line-height: 2;
    }

    .fr {
      font-size: 18px;
      color: #cbd5e1;
      margin: 10px 20px;
    }

    #versets {
      max-width: 800px;
      margin: auto;
      background: #1f2937;
      padding: 30px;
      border-radius: 12px;
    }
  </style>

</head>


<body>

<h1>📖 Les 114 Sourates du Coran</h1>

<div class="sourates" id="liste"></div>

<script>

fetch("https://api.alquran.cloud/v1/surah")
.then(res => res.json())
.then(data => {

const container = document.getElementById("liste")

data.data.forEach(s => {

const a=document.createElement("a")

a.href="sourate.html?id="+s.number

const div=document.createElement("div")

div.className="sourate"

div.innerHTML=s.number+" - "+s.englishName

a.appendChild(div)

container.appendChild(a)

})

})

</script>

</body>
</html>
