<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Sourates</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
}

h1{
text-align:center;
padding:30px;
}

.sourates{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
padding:20px;
max-width:1000px;
margin:auto;
}

.sourate{
background:#1f2937;
padding:15px;
border-radius:10px;
text-align:center;
cursor:pointer;
transition:0.2s;
}

.sourate:hover{
background:#2563eb;
}

a{
color:white;
text-decoration:none;
}
</style>

</head>

<body>

<h1>📖 Les 114 Sourates du Coran</h1>

<div class="sourates" id="liste"></div>

<script>

fetch("https://api.alquran.cloud/v1/surah")
.then(res => res.json())
.then(data => {

const container = document.getElementById("liste")

data.data.forEach(s => {

const a=document.createElement("a")

a.href="sourate.html?id="+s.number

const div=document.createElement("div")

div.className="sourate"

div.innerHTML=s.number+" - "+s.englishName

a.appendChild(div)

container.appendChild(a)

})

})

</script>

</body>
</html>
