<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Sourate</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
padding:20px;
}

h1{
text-align:center;
}

.verset{
.arabe{
direction: rtl;
font-size: 32px;
text-align: right;
margin: 20px;
line-height: 2;
}

.fr{
font-size: 18px;
color: #cbd5e1;
margin: 10px 20px;
}

#versets{
max-width: 800px;
margin: auto;
background: #1f2937;
padding: 30px;
border-radius: 12px;
}
}

audio{
display:block;
margin:auto;
margin-top:20px;
}

</style>

</head>

<body>

<h1 id="titre"></h1>

<div id="versets"></div>

<script>

const params=new URLSearchParams(window.location.search)
const id=params.get("id")

fetch("https://api.alquran.cloud/v1/surah/"+id+"/ar.alafasy")
.then(res=>res.json())
.then(data=>{

document.getElementById("titre").innerText=data.data.englishName

const container=document.getElementById("versets")

data.data.ayahs.forEach(v=>{

const p=document.createElement("p")
p.className="verset"
p.innerText=v.text

container.appendChild(p)

})

})

</script>

</body>
.arabe{
direction:rtl;
font-size:32px;
text-align:right;
margin:20px;
line-height:2;
}

.fr{
font-size:18px;
color:#cbd5e1;
margin:10px 20px;
}

#versets{
max-width:800px;
margin:auto;
background:#1f2937;
padding:30px;
border-radius:12px;
}

</html>
