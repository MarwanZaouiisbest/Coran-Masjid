<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Sourate</title>

<style>

<style>

body{
margin:0;
font-family: 'Segoe UI', sans-serif;
background: linear-gradient(to bottom, #0f172a, #020617);
color: white;
}

h1{
text-align:center;
padding:20px;
font-size:28px;
}

#versets{
max-width:900px;
margin:30px auto;
padding:20px;
}

.verset{
background:#1e293b;
padding:20px;
margin-bottom:20px;
border-radius:15px;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

.arabe{
direction:rtl;
font-size:30px;
text-align:right;
line-height:2;
margin-bottom:10px;
}

.fr{
font-size:16px;
color:#cbd5e1;
margin-bottom:10px;
}

audio{
width:100%;
margin-top:10px;
}

</style>

</style>

</head>

<body>

<h1 id="titre"></h1>

<div id="versets"></div>

<script>

const params=new URLSearchParams(window.location.search)
const id=params.get("id")

fetch("https://api.alquran.cloud/v1/surah/"+id+"/ar.alafasy")
.then(res=>res.json())
.then(data=>{

document.getElementById("titre").innerText=data.data.englishName

const container=document.getElementById("versets")

data.data.ayahs.forEach(v=>{

const p=document.createElement("p")
p.className="verset"
p.innerText=v.text

container.appendChild(p)

})

})

</script>

</body>
.arabe{
direction:rtl;
font-size:32px;
text-align:right;
margin:20px;
line-height:2;
}

.fr{
font-size:18px;
color:#cbd5e1;
margin:10px 20px;
}

#versets{
max-width:800px;
margin:auto;
background:#1f2937;
padding:30px;
border-radius:12px;
}

</html>
